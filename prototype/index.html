<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <title>Applivery Atlas — Sales performance dashboards</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="icon" href="assets/favicon_blue.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="tokens.css"/>
  <link rel="stylesheet" href="app.css"/>
  <link rel="stylesheet" href="screens.css"/>

  <style>
    /* Page-level utilities consumed by app.jsx that don't deserve their own file */
    .tb-divider { display: inline-block; }

    /* TV home screen */
    .tvhome { max-width: 1180px; margin: 0 auto; padding: 8px 0 24px; }
    .tvhome-card {
      background: var(--bg-elev-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-2xl);
      padding: 24px;
    }
    .tvhome-hero {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 32px;
      align-items: center;
    }
    .tvhome-screen {
      aspect-ratio: 16 / 10;
      background: linear-gradient(180deg, var(--bg-elev-2), var(--bg));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      position: relative;
    }
    .tvhome-screen::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(400px 200px at 80% 0%, var(--bg-brand-tint), transparent 70%);
      pointer-events: none;
    }
    .tvhome-screen-inner { position: relative; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
    .tvhome-stat-l { font-size: 11px; color: var(--text-muted); margin-top: 12px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
    .tvhome-stat-v { font-size: 36px; color: var(--text-primary); font-weight: 500; letter-spacing: -0.02em; line-height: 1.1; margin: 4px 0 8px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="widgets.jsx"></script>
  <script type="text/babel" src="screen-dashboard.jsx"></script>
  <script type="text/babel" src="screen-slideshow.jsx"></script>
  <script type="text/babel" src="screen-tv.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
